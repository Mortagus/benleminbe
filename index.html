<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benjamin Lemin - Développeur Web</title>

    <style>
        :root {
            --bg: #0f172a;
            --card: #111827;
            --text: #e5e7eb;
            --accent: #38bdf8;
            --muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(17, 24, 39, 0.9);
            border-radius: 16px;
            padding: 32px;
            text-align: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 20px;
            font-weight: normal;
        }

        p {
            color: var(--muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        a.button {
            text-decoration: none;
            padding: 12px;
            border-radius: 8px;
            background: var(--accent);
            color: #0f172a;
            font-weight: bold;
            transition: transform 0.1s, box-shadow 0.1s;
        }

        a.button.secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        a.button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.3);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.85rem;
            color: var(--muted);
        }

        @media (min-width: 500px) {
            .buttons {
                flex-direction: row;
                justify-content: center;
            }

            a.button {
                flex: 1;
            }
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Benjamin Lemin</h1>
    <h2>Senior PHP Developer & Web Consultant</h2>

    <p>
        Spécialisé dans les applications web existantes (Symfony / Drupal) :
        maintenance, stabilisation, évolution et accompagnement technique.
    </p>

    <div class="buttons">
        <a href="/cv/benjamin_lemin_freelance_consultant.pdf" class="button" target="_blank">
            Télécharger mon CV
        </a>

        <a href="https://www.linkedin.com/in/benlem" class="button secondary" target="_blank">
            LinkedIn
        </a>
    </div>

    <div class="footer">
        Disponible pour missions freelance (temps partiel)
    </div>
</div>

</body>
</html>
