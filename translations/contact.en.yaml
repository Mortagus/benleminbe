contact:
    meta:
        title: "Contact | Benjamin Lemin"
        description: "Reach out for a freelance mission, an existing project takeover, a technical question, or backend support."

    hero:
        eyebrow: "Contact"
        title: "The easiest option: write to me directly."
        intro: >
            If you have a **specific need**, a freelance mission, a project to take over or a technical question,
            send me a few lines about the context and the goal. I can then reply faster and more clearly.
        actions:
            label: "Main actions"
            email: "Send me an email"
            linkedin: "Contact me on LinkedIn"
        note: "To move quickly, the most useful thing is to send me the **context, the need and your expected timing**."

    methods:
        eyebrow: "Channels"
        title: "Pick the channel that is simplest for you"
        intro: "I can reply through whichever channel suits you best. If you are unsure, **email is the most direct**."

        linkedin:
            name: "LinkedIn"
            description: "To discuss a mission, a project or my professional background."
            action: "Open →"

        malt:
            name: "Malt"
            description: "For structured **freelance mission requests**."
            action: "Open →"

        email:
            name: "Email"
            description: "For a direct message, a question or an initial contact."
            action: "Write →"

        whatsapp:
            name: "WhatsApp"
            description: "For a quick exchange if we are already in contact."
            action: "Write →"

    details:
        request:
            title: "What I need to know"
            intro: "To give you a useful answer, a short message is enough if it includes:"
            item_1: "the **context** and the type of project involved;"
            item_2: "the **main need** or the problem to solve;"
            item_3: "the **deadline** or urgency level;"
            item_4: "your preferred **reply channel**."

        availability:
            title: "Availability"
            paragraph_1: >
                I am currently working on **part-time freelance missions**,
                alongside coaching activities and personal projects.

            paragraph_2: >
                If your need is clear but brief, I can also help you structure it before going further.
