        eyebrow: "Contact"
        title: "Let's discuss your project"
        intro: >
            A question, a project idea, a freelance opportunity, or simply feel like getting in touch?
            You can contact me directly through the platforms below.

    methods:
        title: "Get in touch"

        linkedin:
            name: "LinkedIn"
            description: "To discuss a project, a freelance opportunity, or my professional background."
