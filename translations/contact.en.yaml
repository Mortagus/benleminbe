            name: "Malt"
            description: "For structured freelance project requests."
            action: "Open →"

        email:
            name: "Email"
            description: "For direct messages, questions, or an initial conversation."
            action: "Write →"

        whatsapp:
            name: "WhatsApp"
            description: "For quick exchanges if we are already in contact."
            action: "Write →"

