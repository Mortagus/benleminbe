contact:
    meta:
        title: "Contact | Benjamin Lemin"
        description: "Contactez-moi pour une mission freelance, une reprise d'existant, une question technique ou un besoin de renfort backend."

    hero:
        eyebrow: "Contact"
        title: "Le plus simple: m'écrire directement."
        intro: >
            Si vous avez un **besoin concret**, une mission freelance, un projet à reprendre ou une question technique,
            envoyez-moi quelques lignes sur le contexte et l'objectif. Je pourrai vous répondre plus vite et plus clairement.
        actions:
            label: "Actions principales"
            email: "M'envoyer un email"
            linkedin: "Me contacter sur LinkedIn"
        note: "Pour aller vite, le plus efficace est de m'envoyer **le contexte, le besoin et le délai souhaité**."

    methods:
        eyebrow: "Canaux"
        title: "Choisissez le canal le plus simple pour vous"
        intro: "Je peux répondre par le canal qui vous arrange le mieux. Si vous hésitez, **l'email reste le plus direct**."

        linkedin:
            name: "LinkedIn"
            description: "Pour échanger autour d'une **mission**, d'un projet ou de mon parcours."
            action: "Ouvrir →"

        malt:
            name: "Malt"
            description: "Pour les demandes de **mission freelance** structurées."
            action: "Ouvrir →"

        email:
            name: "Email"
            description: "Pour un message direct, une question ou une première prise de contact."
            action: "Écrire →"

        whatsapp:
            name: "WhatsApp"
            description: "Pour un échange rapide si nous sommes déjà en contact."
            action: "Écrire →"

    details:
        request:
            title: "Ce que j'ai besoin de savoir"
            intro: "Pour vous répondre utilement, un message court suffit si vous partagez ces informations:"
            item_1: "le **contexte** et le type de projet concerné;"
            item_2: "le **besoin principal** ou le problème à résoudre;"
            item_3: "le **délai** ou le niveau d'urgence;"
            item_4: "le **canal de réponse** que vous préférez."

        availability:
            title: "Disponibilité"
            paragraph_1: >
                Je travaille actuellement sur des **missions freelance à temps partiel**,
                en parallèle d'activités de coaching et de projets personnels.

            paragraph_2: >
                Si votre besoin est clair mais encore bref, je peux aussi vous aider à le structurer avant d'aller plus loin.
