    meta:
        title: "Simon"
        description: "A public memory game inspired by Simon, integrated into the benlemin.be Lab."

    hero:
        eyebrow: "Memory game"
        title: "Simon"
        intro: "Repeat the color sequence and last as long as you can. Each round adds one more step."

    actions:
        start: "Start a game"
        restart: "Restart"
        back: "Back to the Lab"

    sound:
        on: "Sound on"
        off: "Sound off"
        note: "Audio only starts after an explicit user interaction, as required by the browser."

    metrics:
        label: "Game summary"
        status: "State"
        level: "Level"
        best: "Best score"

    status:
