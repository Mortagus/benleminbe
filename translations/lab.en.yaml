        preparation: "Get ready..."
        demo: "Watch the sequence"
        player: "Your turn"
        success: "Well done!"
        failure: "Game over"

    board:
        label: "Simon play area"
        core:
            eyebrow: "Simon"
            title: "Sequence"
            description: "Watch the demo, then replay the sequence."
        pads:
            top_left:
                label: "Top left"
                aria: "Top-left zone, key 1"
            top_right:
                label: "Top right"
                aria: "Top-right zone, key 2"
            bottom_left:
                label: "Bottom left"
                aria: "Bottom-left zone, key 3"
            bottom_right:
                label: "Bottom right"
                aria: "Bottom-right zone, key 4"

    instructions:
        eyebrow: "Controls"
