        eyebrow: "Audio"
        title: "Son et volume"
        toggle_on: "Couper le son"
        toggle_off: "Activer le son"
        volume_label: "Volume"
        volume_value: "{volume} %"
        active: "Son activé à {volume} %."
        muted: "Son coupé. Volume mémorisé : {volume} %."
        unavailable: "Le son n’est pas disponible dans ce navigateur."

    metrics:
        label: "Résumé de la partie"
        status: "État"
        level: "Niveau"
        best: "Meilleur score"

    status:
        idle: "En attente"
        preparation: "Prépare-toi…"
        demo: "Observe la séquence"
        player: "À toi de jouer"
        success: "Bien joué !"
        failure: "Partie terminée"

    board:
        label: "Zone de jeu Simon"
