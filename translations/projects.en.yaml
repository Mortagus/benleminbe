                        - "SQL"
                -   title: "Framework"
                    items:
                        - "Symfony"
                -   title: "Backend architecture"
                    items:
                        - "REST API"
                -   title: "Infrastructure"
                    items:
                        - "AWS for image storage"
                        - "CDN for global image delivery"
                        - "Docker, first exposure"
                -   title: "Database"
                    items:
                        - "Relational database used for image mapping"
                -   title: "Version control"
                    items:
