moveit:
    meta_title: "Rossel — MoveIT (SSO Platform) | Benjamin Lemin"
    eyebrow: "Client project · SSO · Microservices"
    title: "Rossel — MoveIT (SSO Platform)"
    lead: "Contribution to the design and development of a **scalable unified authentication platform** for the Rossel media ecosystem."

    meta:
        -   label: "Period:"
            value: "11/2023 – 05/2024"
        -   label: "Role:"
            value: "Backend Developer"
        -   label: "Organization:"
            value: "Contraste Digital"
        -   label: "Client:"
            value: "Rossel Group"
        -   label: "Main stack:"
            value: "Go, Gin, Kafka, Docker, Azure, Azure DevOps, ELK Stack"

    sections:
        -   title: "Context"
            paragraphs:
                - "Rossel is one of the largest media groups in Belgium, operating multiple newspapers and digital media platforms, including Le Soir."
                - "The MoveIT project aimed at redesigning the **user management and authentication system** across the Rossel ecosystem."
                - "The objective was to build a new **scalable Single Sign-On platform** capable of supporting all Rossel media brands."
                - "The new system was designed to progressively replace existing authentication mechanisms, starting with Le Soir and later expanding to other newspapers of the group."

        -   title: "Project objectives"
            paragraphs:
                - "The project adopted a **microservices architecture** to ensure long-term scalability and modularity."
            list:
                - "Building a scalable SSO system for the Rossel media ecosystem"
                - "Supporting user authentication across multiple publications"
                - "Improving performance and scalability for millions of users"
                - "Enabling future expansion to additional media brands"

        -   title: "My contributions"
            subsections:
                -   title: "Microservices development"
                    paragraphs:
                        - "I participated in the development of backend services using Go and the Gin framework."
                        - "I implemented two **microservices** responsible for user-related functionalities within the new authentication system."
                        - "I adopted structured request handling using DTO, Data Transfer Object, patterns to ensure clear separation between API contracts and internal business logic."
                -   title: "Event-driven communication"
                    paragraphs:
                        - "I contributed to the design and implementation of **Kafka message structures** used for communication between services."
                        - "The architecture combined REST APIs for synchronous interactions and Kafka event queues for asynchronous communication."
                -   title: "User registration system"
                    paragraphs:
                        - "I contributed to the development of services supporting the new user registration workflow used by Rossel websites."
                        - "These services were consumed by the front-end applications implementing the new user onboarding funnel."
                -   title: "Observability and logging"
                    paragraphs:
                        - "I worked with the ELK stack, Elasticsearch, Logstash and Kibana, to monitor and analyze logs generated by the microservices architecture."
                        - "This setup allowed **centralized log collection** and improved debugging across the distributed system."

        -   title: "Architecture"
            paragraphs:
                - "The system relied on a containerized microservices architecture."
                - "Services were deployed on Azure infrastructure using Azure DevOps CI/CD pipelines."
            groups:
                -   title: "Backend"
                    items:
                        - "Backend services developed in Go"
                        - "Gin framework"
                        - "DTO patterns for structured data exchange"
                -   title: "Communication"
                    items:
                        - "REST APIs for synchronous interactions"
                        - "Kafka for event-driven communication"
                        - "Event queues for asynchronous exchanges"
                -   title: "Infrastructure"
                    items:
                        - "Docker containers"
                        - "Azure"
                        - "Azure DevOps CI/CD pipelines"
                -   title: "Observability"
                    items:
                        - "ELK Stack"
                        - "Elasticsearch"
                        - "Logstash"
                        - "Kibana"
                        - "Centralized log aggregation"

        -   title: "Team"
            paragraphs:
                - "The project involved a large multi-team organization including an infrastructure / DevOps team, several backend teams responsible for different service domains and a frontend team responsible for the user registration experience."
                - "I worked within two Scrum teams: the user registration team, composed of around six to seven members, and the microservices backend team, composed of around five to six developers."

        -   title: "Technical challenges"
            paragraphs:
                - "The project required designing and implementing a highly scalable authentication system capable of supporting multiple media brands."
            list:
                - "Implementing reliable communication between services"
                - "Defining robust Kafka message schemas"
                - "Ensuring scalability and performance for the future Rossel ecosystem"
                - "Monitoring distributed services through centralized logging"

        -   title: "Outcomes / impact"
            paragraphs:
                - "The project contributed to the implementation of a new unified authentication platform designed to progressively replace existing systems in the Rossel ecosystem."
                - "The developed microservices and communication mechanisms contributed to building a scalable technical foundation for user management across multiple media brands."

        -   title: "What this mission brought me"
            highlight: true
            paragraphs:
                - "This mission allowed me to work on a large-scale microservices architecture, with strong challenges related to scalability, inter-service communication and user management."
                - "It strengthened my understanding of distributed systems, event-driven architectures and the challenges of operating high-volume production services."

    back: "← Back to projects"

marge_delhaize:
    meta_title: "Marge Delhaize — Data Integration & Margin Analysis Platform | Benjamin Lemin"
    eyebrow: "Product project · Data integration · Margin analysis"
    title: "Marge Delhaize — Data Integration & Margin Analysis Platform"
    lead: "Development of an **ETL and analytics platform** designed to consolidate operational data from multiple systems in order to analyze real product margins over time."

    meta:
        -   label: "Period:"
            value: "09/2025 – Present"
        -   label: "Role:"
            value: "Lead Developer"
        -   label: "Client:"
            value: "Independent Delhaize store owners"
        -   label: "Main stack:"
            value: "Symfony 7, React, PostgreSQL, Docker, REST API, PHPUnit, PHPStan, Vitest"

    sections:
        -   title: "Context"
            paragraphs:
                - "Independent Delhaize store owners rely on several internal systems to manage their operations."
                - "However, these systems do not communicate directly with each other and provide only partial visibility into real product profitability."
                - "The project aims to build a platform capable of collecting data from multiple operational systems, consolidating this information into a unified data model and providing a clear view of real product margins over time."
                - "This allows store owners to better understand the gap between estimated margins communicated by Delhaize and actual margins observed in their operations."
                - "The platform is designed to support decision-making at the level of individual stores or groups of stores."

        -   title: "Data sources"
            paragraphs:
                - "The system integrates data from three operational systems used by Delhaize stores."
            subsections:
                -   title: "Store Office"
                    paragraphs:
                        - "Database containing product reference information used across the Delhaize ecosystem."
                        - "Access to the data is limited and does not currently provide a straightforward export mechanism."
                -   title: "BabbleWay"
                    paragraphs:
                        - "System containing purchase information from product suppliers."
                        - "Data exports are available in structured formats such as CSV or Excel."
                -   title: "StoreLine"
                    paragraphs:
                        - "Point-of-sale system containing sales transactions recorded at store checkouts."
                        - "Exports are also available in CSV or Excel format."

        -   title: "Project objective"
            paragraphs:
                - "The platform acts as an ETL pipeline and analytical interface."
                - "The long-term goal is to enable near real-time margin monitoring, cross-store margin comparison and improved purchasing negotiations for groups of store owners."
            list:
                - "Extract data from multiple external systems"
                - "Normalize and structure the data in a central database"
                - "Compute product-level margins"
                - "Provide visualization tools for store managers"

        -   title: "Architecture"
            paragraphs:
                - "The system follows a modular web architecture."
            groups:
                -   title: "Backend"
                    items:
                        - "Symfony 7 application"
                        - "REST API exposing data services"
                        - "PostgreSQL for centralized data storage"
                -   title: "Frontend"
                    items:
                        - "React application"
                        - "Communication with backend via REST API"
                -   title: "Infrastructure"
                    items:
                        - "Docker containers for each component"
                        - "Automated test suites for both frontend and backend"

        -   title: "Testing"
            paragraphs:
                - "Several automated testing tools are used to maintain code quality and ensure reliability during development."
            groups:
                -   title: "Backend"
                    items:
                        - "PHPUnit"
                        - "PHPStan"
                -   title: "Frontend"
                    items:
                        - "Vitest"

        -   title: "Use of AI-assisted development"
            paragraphs:
                - "Development of the project involves the use of AI-assisted programming tools, notably Claude Code."
                - "The project workflow includes several specialized AI agents responsible for tasks such as task planning and backlog management, backend code implementation, code review, automated test generation, and frontend component development and review."
                - "These agents assist the development workflow, but the overall architecture and implementation decisions remain under human supervision."

        -   title: "My contributions"
            paragraphs:
                - "The project is developed in collaboration with my brother, who focuses primarily on data acquisition and system architecture."
            list:
                - "Lead development of the backend platform using Symfony 7"
                - "Design and implementation of the REST API"
                - "Implementation of the data storage model using PostgreSQL"
                - "Development of the React frontend interface"
                - "Implementation of automated tests"
                - "Integration of AI-assisted development workflows"

        -   title: "Project status"
            paragraphs:
                - "The project started in September 2025."
                - "Development of the application progressed significantly until December 2025, after which progress slowed due to difficulties accessing data from external systems."
                - "Following recent discussions with the client, access to the required data sources may now be possible, allowing work on the extraction pipeline to resume."

        -   title: "Technical challenges"
            list:
                - "Collecting data from multiple operational systems that do not communicate directly with each other"
                - "Consolidating heterogeneous data formats into a centralized model"
                - "Computing real product margins from purchase data, product reference data and sales data"
                - "Handling data access constraints in external systems"
                - "Designing a modular architecture capable of evolving toward near real-time monitoring"
                - "Maintaining code quality with automated tests and static analysis tools"

        -   title: "Expected outcomes / impact"
            paragraphs:
                - "The platform aims to give independent store owners more precise visibility into the margins actually observed in their operations."
                - "It should make it possible to better understand gaps between estimated and real margins, identify problematic products or periods and support more informed decisions at store or store group level."
                - "In the longer term, the system could also support comparisons between stores and improve purchasing negotiations for groups of owners."

        -   title: "Personal learnings"
            highlight: true
            paragraphs:
                - "This project allows me to work on a strongly data-oriented problem, at the intersection of system integration, business modeling, analytical computation and visualization."
                - "It strengthens my experience with Symfony, React, PostgreSQL, REST architectures, data pipelines and the integration of AI-assisted development tools into a supervised production workflow."

    back: "← Back to projects"

