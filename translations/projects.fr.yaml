keytrade:
    meta_title: "Keytrade Bank — Web Platforms Maintenance | Benjamin Lemin"
    eyebrow: "Mission de consultance · Banque · Maintenance legacy"
    title: "Keytrade Bank — Web Platforms Maintenance"
    lead: "Maintenance de plusieurs plateformes web bancaires : site public, extranet client et intranet administratif, dans un environnement PHP legacy soumis à des contraintes opérationnelles strictes."

    meta:
        -   label: "Période :"
            value: "avril 2019 – juillet 2019"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Keytrade Bank, mission via Blubird"
        -   label: "Stack principale :"
            value: "PHP 5.6, MySQL, SVN, Jenkins, Jira"

    sections:
        -   title: "Contexte du projet"
            paragraphs:
                - "Keytrade Bank est une banque en ligne belge fournissant des services bancaires numériques et des outils de trading en ligne."
                - "Pendant cette mission, j’ai rejoint une petite équipe de développement PHP responsable de la maintenance de plusieurs plateformes web utilisées par la banque."
                - "Ces plateformes étaient distinctes mais interconnectées : le site public, utilisé comme portail marketing et d’onboarding pour les clients potentiels ; l’extranet, une application web privée utilisée par les clients de la banque une fois leur compte créé ; et l’intranet, une interface administrative interne utilisée par les employés de la banque pour gérer certaines opérations clients."
                - "Les systèmes de transactions financières eux-mêmes étaient gérés par d’autres systèmes internes et ne faisaient pas partie des applications sur lesquelles j’ai travaillé."

        -   title: "Architecture du système"
            paragraphs:
                - "Les applications étaient construites avec PHP 5.6, dans une version personnalisée de PHP compilée et certifiée pour les exigences de sécurité de la banque."
                - "Les systèmes reposaient sur une architecture legacy sans framework moderne et étaient maintenus dans une base de code monolithique traditionnelle."
                - "Les composants principaux incluaient des applications backend PHP, des bases de données MySQL, une infrastructure de déploiement interne et des intégrations avec d’autres systèmes bancaires internes."

        -   title: "Mon rôle"
            paragraphs:
                - "J’intervenais comme développeur backend intégré en support de l’équipe de maintenance PHP."
                - "La mission portait principalement sur des activités de maintenance et de debugging."
            list:
                - "Correction de bugs sur le site public, l’extranet et les applications intranet"
                - "Investigation de problèmes de production signalés via le système de tickets interne"
                - "Implémentation de petites corrections et améliorations"
                - "Support à l’équipe existante dans la maintenance des systèmes PHP legacy"

        -   title: "Structure d’équipe"
            paragraphs:
                - "L’équipe de développement PHP était relativement réduite."
                - "Des rôles supplémentaires existaient en dehors de l’équipe, notamment une équipe QA responsable de la validation, sans collaboration directe au quotidien, et un release manager responsable des merges SVN et de la validation des releases."
                - "Les développeurs n’étaient pas autorisés à effectuer eux-mêmes les merges de production."
            list:
                - "Un technical lead agissant à la fois comme architecte et coordinateur de département"
                - "Un consultant freelance"
                - "Moi-même comme consultant via Blubird"
                - "Une équipe QA responsable de la validation"
                - "Un release manager responsable des merges SVN et de la validation des releases"

        -   title: "Technologies utilisées"
            groups:
                -   title: "Backend"
                    items:
                        - "PHP 5.6 avec build personnalisé certifié pour la sécurité"
                -   title: "Base de données"
                    items:
                        - "MySQL"
                -   title: "Version control"
                    items:
                        - "SVN"
                -   title: "DevOps"
                    items:
                        - "Jenkins, version legacy utilisée pour les déploiements"
                -   title: "Gestion de projet"
                    items:
                        - "Jira"

        -   title: "Pratiques de développement"
            paragraphs:
                - "Le processus de développement suivait un workflow relativement traditionnel."
                - "Le processus n’était pas Agile au sens moderne du terme et correspondait davantage à un workflow continu de maintenance."
            list:
                - "Contrôle centralisé des merges dans SVN"
                - "Code reviews réalisées manuellement par le release manager"
                - "Processus de déploiement basé sur Jenkins"
                - "Maintenance et correction de bugs pilotées par les tickets"

        -   title: "Défis techniques"
            subsections:
                -   title: "Base de code PHP legacy"
                    paragraphs:
                        - "Les applications étaient construites sur une large base de code legacy avec une structure architecturale limitée."
                        - "Comprendre le système et implémenter des corrections nécessitait de naviguer prudemment dans le code existant afin d’éviter d’introduire des régressions."
                -   title: "Contraintes de sécurité"
                    paragraphs:
                        - "En raison du contexte bancaire, le runtime PHP lui-même était une version compilée sur mesure et certifiée pour la sécurité."
                        - "Cela imposait des contraintes supplémentaires sur l’environnement de développement et les processus de déploiement."

        -   title: "Résultats / impact"
            paragraphs:
                - "Mon travail a soutenu la stabilité de plusieurs plateformes web utilisées par Keytrade Bank, en corrigeant des bugs et en maintenant des fonctionnalités existantes."
                - "La mission a permis de réduire la charge de travail de la petite équipe PHP interne responsable de ces systèmes."

        -   title: "Apprentissages personnels"
            highlight: true
            paragraphs:
                - "Bien que la mission ait été courte, elle m’a exposé au fonctionnement interne d’une organisation bancaire."
                - "Les principaux apprentissages incluaient la découverte de l’environnement opérationnel d’une banque digitale, la compréhension des contraintes que les secteurs régulés peuvent imposer à l’évolution technologique, et le travail dans une base de code PHP legacy maintenue sous des procédures opérationnelles strictes."
                - "L’expérience a également mis en évidence l’écart qui peut exister entre les pratiques modernes de développement et les systèmes legacy maintenus dans des environnements fortement régulés."

    back: "← Retour aux projets"

famille_chretienne:
    meta_title: "Famille Chrétienne — Plateforme éditoriale DPI | Benjamin Lemin"
    eyebrow: "Projet client · Média · Drupal"
    title: "Famille Chrétienne — Plateforme éditoriale DPI"
    lead: "Adaptation et déploiement d’une plateforme éditoriale Drupal 7 issue de DPI afin de créer une version white-label réutilisable pour d’autres médias, puis de l’adapter au site Famille Chrétienne."

    meta:
        -   label: "Période :"
            value: "2020, environ un an"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Contraste Digital"
        -   label: "Client :"
            value: "Groupe Famille Chrétienne"
        -   label: "Stack principale :"
            value: "PHP, Drupal 7, plateforme DPI, Bash"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Le projet consistait à déployer DPI, une plateforme éditoriale développée par Contraste Digital au-dessus de Drupal 7."
                - "DPI avait été initialement créée pour le groupe média belge Rossel, éditeur du Soir, et avait progressivement évolué en une plateforme complexe supportant plusieurs sites d’actualité numériques."
                - "La plateforme fournit plusieurs capacités essentielles aux opérations de médias en ligne : publication d’articles et workflows éditoriaux, composition de pages d’accueil et de pages de sections, intégration publicitaire, flux de contenus externes, gestion des abonnements et gestion des comptes utilisateurs."
                - "Dans l’écosystème Rossel, les journalistes écrivent leurs articles dans un système éditorial dédié. Les articles sont stockés dans un système séparé puis synchronisés avec Drupal/DPI, qui les rend sur le site web selon leur contexte éditorial, par exemple les sections ou le placement en page d’accueil."
                - "Famille Chrétienne, une organisation média en croissance, avait besoin d’une plateforme plus scalable et maintenable pour soutenir le développement de sa présence numérique."

        -   title: "Objectif du projet"
            paragraphs:
                - "L’objectif du projet était de transformer l’implémentation de DPI spécifique à Rossel en une plateforme white-label pouvant être réutilisée par d’autres organisations médias."
                - "Une fois cette version générique créée, la plateforme a été personnalisée et déployée pour le site web de Famille Chrétienne."

        -   title: "Mes contributions"
            subsections:
                -   title: "Découplage de la plateforme"
                    paragraphs:
                        - "J’ai travaillé à l’extraction des dépendances spécifiques à Rossel depuis la base de code DPI existante afin de créer une version de la plateforme indépendante d’un média spécifique."
                        - "L’objectif était de créer une installation de base réutilisable de DPI pouvant être adaptée à d’autres éditeurs."
                    list:
                        - "Suppression de valeurs de configuration hardcodées"
                        - "Transformation de certaines fonctionnalités pour les rendre configurables"
                        - "Adaptation de structures de pages initialement conçues pour des sites médias Rossel"
                -   title: "Automatisation du déploiement"
                    paragraphs:
                        - "J’ai conçu et implémenté un script d’installation Bash capable de bootstrapper une nouvelle instance DPI depuis un répertoire vide."
                        - "Le script automatisait plusieurs étapes du processus de configuration de la plateforme et simplifiait le déploiement de nouveaux sites médias basés sur DPI."
                -   title: "Développement spécifique pour Famille Chrétienne"
                    paragraphs:
                        - "J’ai contribué à l’adaptation de la plateforme aux besoins spécifiques du site éditorial Famille Chrétienne."
                        - "Les tâches incluaient du développement backend sur des modules Drupal/DPI, de la configuration et personnalisation de la plateforme, ainsi que l’implémentation de fonctionnalités spécifiques."
                        - "Un exemple de fonctionnalité consistait à implémenter une tâche planifiée récupérant une citation biblique quotidienne et la publiant automatiquement sur une page dédiée."

        -   title: "Équipe"
            paragraphs:
                - "Le projet était réalisé par deux développeurs backend, avec la collaboration d’un développeur expérimenté sur la plateforme DPI."

        -   title: "Technologies utilisées"
            groups:
                -   title: "Backend"
                    items:
                        - "PHP"
                        - "Drupal 7"
                        - "Modules Drupal/DPI"
                -   title: "Plateforme éditoriale"
                    items:
                        - "DPI"
                        - "Publication d’articles"
                        - "Workflows éditoriaux"
                        - "Composition de pages d’accueil et de sections"
                        - "Gestion des abonnements"
                        - "Gestion des comptes utilisateurs"
                -   title: "Automatisation"
                    items:
                        - "Bash"
                        - "Script d’installation"
                        - "Bootstrap d’une nouvelle instance depuis un répertoire vide"
                -   title: "Intégrations et contenus"
                    items:
                        - "Flux de contenus externes"
                        - "Synchronisation d’articles depuis un système éditorial dédié"
                        - "Tâche planifiée pour la publication automatique d’une citation biblique quotidienne"

        -   title: "Défis techniques"
            paragraphs:
                - "Le principal défi était de travailler avec une large plateforme legacy initialement conçue pour un groupe média spécifique."
                - "Plutôt que de réaliser un refactoring architectural complet, le travail s’est concentré sur un découplage progressif de la logique spécifique à Rossel et sur la transformation de composants clés pour les rendre configurables."
                - "Cette approche a permis à l’équipe de livrer une version white-label fonctionnelle de DPI dans les contraintes de planning du projet."

        -   title: "Résultats / impact"
            paragraphs:
                - "Le projet a permis de transformer une plateforme éditoriale initialement fortement liée à Rossel en une base plus générique et réutilisable pour d’autres organisations médias."
                - "Cette base white-label a ensuite été personnalisée et déployée pour Famille Chrétienne, afin de soutenir le développement de sa présence numérique avec une plateforme plus scalable et maintenable."

        -   title: "Apprentissages personnels"
            highlight: true
            paragraphs:
                - "Cette mission m’a permis de travailler sur une large plateforme Drupal 7 existante, avec des enjeux de réutilisation, de configuration et de découplage progressif."
                - "Elle a renforcé mon expérience dans la maintenance et l’adaptation de plateformes legacy complexes, ainsi que dans l’automatisation de déploiements via des scripts Bash."

    back: "← Retour aux projets"

stanhome:
    meta_title: "Stanhome E-commerce Platform | Benjamin Lemin"
    eyebrow: "Projet client · E-commerce · Drupal"
    title: "Stanhome — Plateforme e-commerce (France & Italie)"
    lead: "Contribution à la modernisation d’une plateforme e-commerce multi-pays, combinant vente en ligne et réseau de distribution directe."

    meta:
        -   label: "Période :"
            value: "2021 – 2022"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Contraste Digital"
        -   label: "Client :"
            value: "Stanhome"
        -   label: "Stack principale :"
            value: "PHP, Drupal 7, Drupal Commerce, ElasticSearch, Google Maps API, Salesforce"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Stanhome est une entreprise européenne de vente directe spécialisée dans les produits d’entretien et de beauté."
                - "Le projet consistait à moderniser la plateforme e-commerce de l’entreprise, en commençant par le marché français puis en l’étendant au marché italien."
                - "Stanhome fonctionne en partie avec un modèle de réseau de vente directe, dans lequel des vendeurs indépendants organisent des événements de présentation de produits et vendent directement aux clients, dans un modèle similaire à des réunions à domicile de type Tupperware."
                - "La plateforme devait donc supporter à la fois des capacités e-commerce classiques et des fonctionnalités alignées avec ce modèle de distribution."

        -   title: "Objectifs du projet"
            paragraphs:
                - "Les objectifs principaux couvraient à la fois la modernisation visuelle, la performance, l’optimisation du parcours d’achat, le support du réseau de distributeurs et l’intégration avec les outils internes de l’entreprise."
                - "Après la livraison de la plateforme française, l’architecture a été réutilisée et adaptée pour le marché italien."
            list:
                - "Redesign du thème visuel de la plateforme e-commerce"
                - "Amélioration des performances lors de la navigation dans de larges catalogues de produits"
                - "Optimisation du tunnel d’achat afin d’améliorer la conversion"
                - "Implémentation d’outils permettant aux utilisateurs de localiser des distributeurs proches"
                - "Accélération des opérations marketing telles que les promotions de produits"
                - "Intégration des données de vente avec le système CRM de l’entreprise"

        -   title: "Mes contributions"
            subsections:
                -   title: "Optimisation du catalogue produit"
                    paragraphs:
                        - "J’ai amélioré les performances de navigation dans le catalogue en intégrant ElasticSearch."
                        - "ElasticSearch était utilisé pour la recherche produit, la navigation à facettes et le filtrage des produits dans le catalogue."
                        - "Cette intégration a significativement amélioré les performances et l’utilisabilité de la navigation produit."
                -   title: "Amélioration du checkout et du tunnel de vente"
                    paragraphs:
                        - "J’ai contribué à l’amélioration du tunnel d’achat, en aidant à fluidifier le processus de commande et à améliorer l’expérience utilisateur."
                -   title: "Dealer locator"
                    paragraphs:
                        - "J’ai implémenté une fonctionnalité de dealer locator avec Google Maps API, permettant aux utilisateurs de trouver des distributeurs proches sur base de leur localisation géographique."
                        - "Cette fonctionnalité soutenait directement le modèle de distribution en vente directe de Stanhome."
                -   title: "Automatisation marketing"
                    paragraphs:
                        - "J’ai participé à l’implémentation de mécanismes permettant des mises à jour semi-automatisées du catalogue produit, afin de permettre aux équipes marketing d’activer des promotions plus rapidement."
                        - "Cela incluait de la logique backend et des tâches de synchronisation basées sur des cron jobs au sein de la plateforme Drupal."
                -   title: "Intégration CRM"
                    paragraphs:
                        - "J’ai travaillé sur l’intégration entre la plateforme e-commerce et le CRM Salesforce de l’entreprise."
                        - "Les données liées aux ventes étaient transmises depuis Drupal Commerce vers Salesforce, permettant aux équipes internes de suivre l’activité commerciale et les interactions clients dans l’écosystème CRM."
                -   title: "Déploiement multi-pays"
                    paragraphs:
                        - "Après l’implémentation française, j’ai participé à l’adaptation de la plateforme pour le marché italien."
                        - "L’approche consistait à réutiliser l’architecture développée pour la France tout en adaptant certaines fonctionnalités aux besoins locaux."

        -   title: "Équipe"
            paragraphs:
                - "J’ai travaillé au sein d’une équipe de développement chez Contraste Digital, en collaboration avec les parties prenantes produit et techniques du client."

        -   title: "Technologies utilisées"
            groups:
                -   title: "Backend"
                    items:
                        - "PHP"
                        - "Drupal 7"
                        - "Drupal Commerce"
                -   title: "Recherche & performance"
                    items:
                        - "ElasticSearch"
                        - "Recherche produit"
                        - "Navigation à facettes"
                        - "Filtrage catalogue"
                -   title: "Intégrations"
                    items:
                        - "Google Maps API pour la localisation de distributeurs"
                        - "Salesforce CRM"
                        - "Synchronisations via cron jobs"
                -   title: "Modèle métier"
                    items:
                        - "E-commerce classique"
                        - "Réseau de vente directe"
                        - "Déploiement multi-pays France et Italie"

        -   title: "Défis techniques"
            paragraphs:
                - "Le projet nécessitait de trouver un équilibre entre performance e-commerce, flexibilité marketing et déploiement international."
            list:
                - "Gérer efficacement de larges catalogues de produits"
                - "Implémenter un filtrage produit rapide via ElasticSearch"
                - "Supporter le modèle hybride de Stanhome combinant e-commerce et réseau de vente directe"
                - "Adapter l’architecture à plusieurs marchés tout en conservant une base technique commune"

        -   title: "Résultats / impact"
            paragraphs:
                - "Le projet a contribué à moderniser la plateforme e-commerce de Stanhome pour le marché français, puis à réutiliser cette base pour le marché italien."
                - "Les améliorations apportées au catalogue, au tunnel d’achat, aux outils de localisation et aux intégrations CRM ont renforcé la capacité de la plateforme à soutenir à la fois les ventes en ligne et le modèle de distribution directe."

        -   title: "Ce que cette mission m’a apporté"
            highlight: true
            paragraphs:
                - "Cette mission m’a permis de travailler sur une plateforme e-commerce complexe, avec des enjeux forts de performance, de marketing, d’intégration avec des systèmes externes et de déploiement multi-pays."
                - "Elle a renforcé ma capacité à intervenir sur des architectures Drupal existantes, à optimiser des parcours utilisateurs et à intégrer des services tiers dans un écosystème applicatif structuré."

    back: "← Retour aux projets"

his:
    meta_title: "Hôpitaux Iris Sud — Site institutionnel & intranet | Benjamin Lemin"
    eyebrow: "Projet client · Santé · Drupal"
    title: "Hôpitaux Iris Sud — Site institutionnel & intranet"
    lead: "Mise en place d’un site institutionnel Drupal 9 unifié pour quatre hôpitaux bruxellois, avec intranet, recherche de praticiens, aide à la prise de rendez-vous et authentification ADFS."

    meta:
        -   label: "Période :"
            value: "03/2022 – 07/2022"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Contraste Digital"
        -   label: "Client :"
            value: "Hôpitaux Iris Sud"
        -   label: "Stack principale :"
            value: "PHP, Drupal 9, OAuth2, ADFS, Progenda"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Hôpitaux Iris Sud est un réseau de quatre hôpitaux situés dans la région bruxelloise."
                - "Le projet consistait à construire un nouveau site web unifié représentant les quatre hôpitaux du groupe."
                - "L’objectif était de centraliser la communication vers le public et de standardiser la manière dont les différents sites hospitaliers étaient présentés en ligne."
                - "La plateforme incluait un site institutionnel public fournissant des informations sur les services et les praticiens, ainsi qu’une section intranet permettant au personnel hospitalier de gérer les communications internes."

        -   title: "Objectifs du projet"
            list:
                - "Fournir une présence numérique unifiée pour les quatre hôpitaux"
                - "Simplifier la recherche de praticiens sur l’ensemble des sites hospitaliers"
                - "Faciliter le processus de prise de rendez-vous"
                - "Permettre la gestion des communications internes par le personnel hospitalier"

        -   title: "Mes contributions"
            subsections:
                -   title: "Mise en place de la plateforme Drupal"
                    paragraphs:
                        - "J’ai participé à la mise en place du CMS Drupal 9 utilisé à la fois pour le site public et pour l’intranet."
                    list:
                        - "Installation et configuration Drupal"
                        - "Mise en place multilingue"
                        - "Développement backend de fonctionnalités spécifiques"
                -   title: "Outil de recherche de praticiens et d’aide à la prise de rendez-vous"
                    paragraphs:
                        - "J’ai implémenté une interface de recherche aidant les utilisateurs à trouver le praticien approprié."
                        - "L’outil permettait aux utilisateurs de filtrer les résultats selon trois critères : le service médical, le spécialiste et le site hospitalier."
                        - "Une fois un praticien sélectionné, les utilisateurs pouvaient poursuivre le processus de prise de rendez-vous via une intégration Progenda."
                -   title: "Intégration SSO avec ADFS"
                    paragraphs:
                        - "J’ai développé un module Drupal personnalisé implémentant l’authentification via ADFS, Active Directory Federation Services, en utilisant OAuth2."
                        - "Cette intégration permettait au personnel hospitalier d’accéder à l’intranet avec ses identifiants organisationnels existants."
                        - "Des restrictions d’accès supplémentaires ont été implémentées via un contrôle d’accès basé sur les adresses IP."
                -   title: "Gestion des accès"
                    paragraphs:
                        - "J’ai implémenté des mécanismes d’authentification et de contrôle d’accès permettant au personnel hospitalier de gérer les contenus de communication interne."

        -   title: "Équipe"
            paragraphs:
