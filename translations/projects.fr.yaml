                - "1 intégrateur frontend"
                - "Le responsable IT des Hôpitaux Iris Sud"
                - "Moi-même comme développeur backend principal"
                - "Support de Didier Lahousse pour l’intégration ADFS"

        -   title: "Technologies utilisées"
            groups:
