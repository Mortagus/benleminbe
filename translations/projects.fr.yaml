moveit:
    meta_title: "Rossel — MoveIT (SSO Platform) | Benjamin Lemin"
    eyebrow: "Projet client · SSO · Microservices"
    title: "Rossel — MoveIT (plateforme SSO)"
    lead: "Contribution à la conception et au développement d’une plateforme d’authentification unifiée scalable pour l’écosystème média du groupe Rossel."

    meta:
        -   label: "Période :"
            value: "11/2023 – 05/2024"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Contraste Digital"
        -   label: "Client :"
            value: "Rossel Group"
        -   label: "Stack principale :"
            value: "Go, Gin, Kafka, Docker, Azure, Azure DevOps, ELK Stack"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Rossel est l’un des plus grands groupes médias en Belgique, opérant plusieurs journaux et plateformes médias numériques, dont Le Soir."
                - "Le projet MoveIT visait à refondre le système de gestion des utilisateurs et d’authentification à l’échelle de l’écosystème Rossel."
                - "L’objectif était de construire une nouvelle plateforme Single Sign-On scalable, capable de supporter l’ensemble des marques médias du groupe Rossel."
                - "Le nouveau système était conçu pour remplacer progressivement les mécanismes d’authentification existants, en commençant par Le Soir puis en s’étendant ensuite aux autres journaux du groupe."

        -   title: "Objectifs du projet"
            paragraphs:
                - "Le projet adoptait une architecture microservices afin d’assurer la scalabilité et la modularité à long terme."
            list:
                - "Construire un système SSO scalable pour l’écosystème média Rossel"
                - "Supporter l’authentification des utilisateurs à travers plusieurs publications"
                - "Améliorer la performance et la scalabilité pour des millions d’utilisateurs"
                - "Permettre l’extension future vers d’autres marques médias"

        -   title: "Mes contributions"
            subsections:
                -   title: "Développement de microservices"
                    paragraphs:
                        - "J’ai participé au développement de services backend en Go avec le framework Gin."
                        - "J’ai implémenté deux microservices responsables de fonctionnalités liées aux utilisateurs dans le nouveau système d’authentification."
                        - "J’ai adopté une gestion structurée des requêtes avec des patterns DTO, Data Transfer Object, afin d’assurer une séparation claire entre les contrats API et la logique métier interne."
                -   title: "Communication orientée événements"
                    paragraphs:
                        - "J’ai contribué à la conception et à l’implémentation des structures de messages Kafka utilisées pour la communication entre services."
                        - "L’architecture combinait des APIs REST pour les interactions synchrones et des files d’événements Kafka pour la communication asynchrone."
                -   title: "Système d’inscription utilisateur"
                    paragraphs:
                        - "J’ai contribué au développement de services soutenant le nouveau workflow d’inscription utilisateur utilisé par les sites Rossel."
                        - "Ces services étaient consommés par les applications frontend implémentant le nouveau tunnel d’onboarding utilisateur."
                -   title: "Observabilité et logging"
                    paragraphs:
                        - "J’ai travaillé avec la stack ELK, Elasticsearch, Logstash et Kibana, afin de monitorer et analyser les logs générés par l’architecture microservices."
                        - "Cette configuration permettait une collecte centralisée des logs et améliorait le debugging à travers le système distribué."

        -   title: "Architecture"
            paragraphs:
                - "Le système reposait sur une architecture microservices containerisée."
                - "Les services étaient déployés sur une infrastructure Azure avec des pipelines CI/CD Azure DevOps."
            groups:
                -   title: "Backend"
                    items:
                        - "Services backend développés en Go"
                        - "Framework Gin"
                        - "Patterns DTO pour structurer les échanges"
                -   title: "Communication"
                    items:
                        - "REST APIs pour les interactions synchrones"
                        - "Kafka pour la communication orientée événements"
                        - "Files d’événements pour les échanges asynchrones"
                -   title: "Infrastructure"
                    items:
                        - "Docker containers"
                        - "Azure"
                        - "Azure DevOps CI/CD pipelines"
                -   title: "Observabilité"
                    items:
                        - "ELK Stack"
                        - "Elasticsearch"
                        - "Logstash"
                        - "Kibana"
                        - "Agrégation centralisée des logs"

        -   title: "Équipe"
            paragraphs:
                - "Le projet s’inscrivait dans une large organisation multi-équipes incluant une équipe infrastructure / DevOps, plusieurs équipes backend responsables de différents domaines de services et une équipe frontend responsable de l’expérience d’inscription utilisateur."
                - "J’ai travaillé au sein de deux équipes Scrum : l’équipe dédiée à l’inscription utilisateur, composée d’environ six à sept membres, et l’équipe backend microservices, composée d’environ cinq à six développeurs."

        -   title: "Défis techniques"
            paragraphs:
                - "Le projet nécessitait de concevoir et implémenter un système d’authentification hautement scalable capable de supporter plusieurs marques médias."
            list:
                - "Implémenter une communication fiable entre services"
                - "Définir des schémas de messages Kafka robustes"
                - "Assurer la scalabilité et la performance pour le futur écosystème Rossel"
                - "Monitorer des services distribués via une centralisation des logs"

        -   title: "Résultats / impact"
            paragraphs:
                - "Le projet a contribué à la mise en place d’une nouvelle plateforme d’authentification unifiée destinée à remplacer progressivement les systèmes existants dans l’écosystème Rossel."
                - "Les microservices développés et les mécanismes de communication mis en place participaient à la construction d’une base technique scalable pour la gestion des utilisateurs à travers plusieurs marques médias."

        -   title: "Ce que cette mission m’a apporté"
            highlight: true
            paragraphs:
                - "Cette mission m’a permis de travailler sur une architecture microservices à grande échelle, avec des enjeux forts de scalabilité, de communication inter-services et de gestion des utilisateurs."
                - "Elle a renforcé ma compréhension des systèmes distribués, des architectures orientées événements et des problématiques liées à la mise en production de services à forte volumétrie."

    back: "← Retour aux projets"

marge_delhaize:
    meta_title: "Marge Delhaize — Plateforme d’intégration de données et d’analyse de marge | Benjamin Lemin"
    eyebrow: "Projet produit · Data integration · Analyse de marge"
    title: "Marge Delhaize — Plateforme d’intégration de données et d’analyse de marge"
    lead: "Développement d’une plateforme ETL et analytique destinée à consolider des données opérationnelles issues de plusieurs systèmes afin d’analyser les marges réelles des produits dans le temps."

    meta:
        -   label: "Période :"
            value: "09/2025 – présent"
        -   label: "Rôle :"
            value: "Lead Developer"
        -   label: "Client :"
            value: "Propriétaires indépendants de magasins Delhaize"
        -   label: "Stack principale :"
            value: "Symfony 7, React, PostgreSQL, Docker, REST API, PHPUnit, PHPStan, Vitest"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Les propriétaires indépendants de magasins Delhaize s’appuient sur plusieurs systèmes internes pour gérer leurs opérations."
                - "Cependant, ces systèmes ne communiquent pas directement entre eux et ne fournissent qu’une visibilité partielle sur la rentabilité réelle des produits."
                - "Le projet vise à construire une plateforme capable de collecter des données depuis plusieurs systèmes opérationnels, de consolider ces informations dans un modèle de données unifié et de fournir une vue claire des marges réelles des produits dans le temps."
                - "Cela permet aux propriétaires de magasins de mieux comprendre l’écart entre les marges estimées communiquées par Delhaize et les marges réellement observées dans leurs opérations."
                - "La plateforme est conçue pour soutenir la prise de décision au niveau d’un magasin individuel ou de groupes de magasins."

        -   title: "Sources de données"
            paragraphs:
                - "Le système intègre des données provenant de trois systèmes opérationnels utilisés par les magasins Delhaize."
            subsections:
                -   title: "Store Office"
                    paragraphs:
                        - "Base de données contenant les informations de référence produit utilisées dans l’écosystème Delhaize."
                        - "L’accès aux données est limité et ne fournit actuellement pas de mécanisme d’export simple."
                -   title: "BabbleWay"
                    paragraphs:
                        - "Système contenant les informations d’achat provenant des fournisseurs de produits."
                        - "Des exports de données sont disponibles dans des formats structurés tels que CSV ou Excel."
                -   title: "StoreLine"
                    paragraphs:
                        - "Système de caisse contenant les transactions de vente enregistrées aux caisses des magasins."
                        - "Des exports sont également disponibles en format CSV ou Excel."

        -   title: "Objectif du projet"
            paragraphs:
                - "La plateforme agit comme un pipeline ETL et une interface analytique."
                - "L’objectif à long terme est de permettre un suivi quasi temps réel des marges, une comparaison des marges entre magasins et une amélioration des négociations d’achat pour des groupes de propriétaires de magasins."
            list:
                - "Extraire les données depuis plusieurs systèmes externes"
                - "Normaliser et structurer les données dans une base de données centrale"
                - "Calculer les marges au niveau produit"
                - "Fournir des outils de visualisation pour les gestionnaires de magasins"

        -   title: "Architecture"
            paragraphs:
                - "Le système suit une architecture web modulaire."
            groups:
                -   title: "Backend"
                    items:
                        - "Application Symfony 7"
                        - "API REST exposant les services de données"
                        - "PostgreSQL pour le stockage centralisé des données"
                -   title: "Frontend"
                    items:
                        - "Application React"
                        - "Communication avec le backend via API REST"
                -   title: "Infrastructure"
                    items:
                        - "Conteneurs Docker pour chaque composant"
                        - "Suites de tests automatisés pour le frontend et le backend"

        -   title: "Tests"
            paragraphs:
                - "Plusieurs outils de tests automatisés sont utilisés afin de maintenir la qualité du code et d’assurer la fiabilité pendant le développement."
            groups:
                -   title: "Backend"
                    items:
                        - "PHPUnit"
                        - "PHPStan"
                -   title: "Frontend"
                    items:
                        - "Vitest"

        -   title: "Utilisation du développement assisté par IA"
            paragraphs:
                - "Le développement du projet implique l’utilisation d’outils de programmation assistée par IA, notamment Claude Code."
                - "Le workflow du projet inclut plusieurs agents IA spécialisés responsables de tâches telles que la planification des tâches et la gestion du backlog, l’implémentation de code backend, la code review, la génération de tests automatisés, ainsi que le développement et la review de composants frontend."
                - "Ces agents assistent le workflow de développement, mais les décisions globales d’architecture et d’implémentation restent sous supervision humaine."

        -   title: "Mes contributions"
            paragraphs:
                - "Le projet est développé en collaboration avec mon frère, qui se concentre principalement sur l’acquisition des données et l’architecture système."
            list:
                - "Lead development de la plateforme backend avec Symfony 7"
                - "Conception et implémentation de l’API REST"
                - "Implémentation du modèle de stockage des données avec PostgreSQL"
                - "Développement de l’interface frontend React"
                - "Implémentation de tests automatisés"
                - "Intégration de workflows de développement assistés par IA"

        -   title: "Statut du projet"
            paragraphs:
                - "Le projet a commencé en septembre 2025."
                - "Le développement de l’application a progressé de manière significative jusqu’en décembre 2025, après quoi l’avancement a ralenti en raison de difficultés d’accès aux données depuis les systèmes externes."
                - "À la suite de discussions récentes avec le client, l’accès aux sources de données nécessaires pourrait désormais être possible, ce qui permettrait de reprendre le travail sur le pipeline d’extraction."

        -   title: "Défis techniques"
            list:
                - "Collecter des données depuis plusieurs systèmes opérationnels qui ne communiquent pas directement entre eux"
                - "Consolider des formats de données hétérogènes dans un modèle centralisé"
                - "Calculer des marges réelles au niveau produit à partir de données d’achat, de référence produit et de ventes"
                - "Gérer les contraintes d’accès aux données dans des systèmes externes"
                - "Concevoir une architecture modulaire capable d’évoluer vers du suivi quasi temps réel"
                - "Maintenir la qualité du code avec des tests automatisés et des outils d’analyse statique"

        -   title: "Résultats / impact attendu"
            paragraphs:
                - "La plateforme vise à donner aux propriétaires indépendants de magasins une visibilité plus précise sur les marges réellement observées dans leurs opérations."
                - "Elle doit permettre de mieux comprendre les écarts entre les marges estimées et les marges réelles, d’identifier les produits ou périodes problématiques et de soutenir des décisions plus éclairées au niveau d’un magasin ou d’un groupe de magasins."
                - "À plus long terme, le système pourrait également soutenir des comparaisons entre magasins et améliorer les négociations d’achat pour des groupes de propriétaires."

        -   title: "Apprentissages personnels"
            highlight: true
            paragraphs:
                - "Ce projet me permet de travailler sur une problématique fortement orientée données, à l’intersection entre intégration de systèmes, modélisation métier, calcul analytique et visualisation."
                - "Il renforce mon expérience sur Symfony, React, PostgreSQL, les architectures REST, les pipelines de données et l’intégration d’outils de développement assisté par IA dans un workflow de production supervisé."

    back: "← Retour aux projets"

coaching:
