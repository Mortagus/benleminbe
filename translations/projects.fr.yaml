raidgbs:
    meta_title: "RAIDGBS Research Project | Benjamin Lemin"
    eyebrow: "Projet de recherche · Bioinformatique · Data ingestion"
    title: "RAIDGBS Research Project"
    lead: "Conception et implémentation d’un système capable de récupérer des données de séquences ADN depuis des bases de données biologiques publiques et de les stocker dans une base de données locale structurée."

    meta:
        -   label: "Période :"
            value: "février 2010 – juin 2010"
        -   label: "Rôle :"
            value: "Développeur principal dans le cadre d’un stage de fin d’études"
        -   label: "Organisation :"
            value: "CBMN — Centre de Biophysique Moléculaire Numérique, Gembloux"
        -   label: "Stack principale :"
            value: "Perl, SQL, Bash, MySQL, Linux"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Ce projet a été réalisé dans le cadre de mon travail de fin d’études pendant mon bachelier en informatique."
                - "Le travail s’est déroulé au CBMN, le Centre de Biophysique Moléculaire Numérique à Gembloux, et faisait partie du programme de recherche RAIDGBS."
                - "RAIDGBS portait sur l’analyse de séquences génétiques de streptocoques du groupe B, une bactérie pouvant provoquer de graves infections chez les nouveau-nés lorsqu’elle est transmise par la mère pendant la grossesse ou l’accouchement."
                - "L’objectif plus large du programme de recherche était de mieux comprendre la variabilité génétique de ces bactéries afin de contribuer au développement de tests diagnostiques plus rapides et plus abordables."
                - "Mon travail portait sur la construction du système de traitement de données utilisé pour collecter et structurer les données de séquences biologiques utilisées dans cette recherche."

        -   title: "Objectif"
            paragraphs:
                - "Concevoir et implémenter un système capable de récupérer des données de séquences ADN depuis des bases de données biologiques publiques et de les stocker dans une base de données locale structurée."
                - "Le système devait automatiser la récupération et le traitement de ces jeux de données afin que les chercheurs puissent facilement accéder aux informations collectées et travailler avec celles-ci."

        -   title: "Mon rôle"
            paragraphs:
                - "J’étais le développeur principal responsable de l’implémentation du système pendant mon stage de fin d’études."
                - "Le projet a été réalisé sous la supervision du chercheur Sven Steinhauer, qui avait préalablement défini les objectifs de recherche, les sources de données et l’approche technologique."
                - "Mon travail s’est concentré sur l’implémentation technique du système, incluant la conception de la base de données, les scripts de traitement des données et l’automatisation du workflow d’ingestion."

        -   title: "Responsabilités"
            list:
                - "Implémentation du système d’ingestion de données"
                - "Conception du schéma de base de données"
                - "Développement de scripts Perl pour récupérer et traiter les jeux de données biologiques"
                - "Génération de fichiers SQL utilisés pour alimenter la base de données"
                - "Implémentation du script Bash orchestrant le workflow d’ingestion"
                - "Test et validation du processus d’ingestion de données"
                - "Documentation du système dans le cadre du mémoire académique"

        -   title: "Défis techniques"
            list:
                - "Apprendre Perl au début du projet afin de développer les scripts de traitement de données"
                - "Récupérer et traiter des jeux de données biologiques issus de bases de données publiques"
                - "Concevoir un schéma de base de données adapté au stockage d’informations de séquences ADN"
                - "Automatiser le pipeline d’ingestion à l’aide de scripts Perl et Bash"
                - "Gérer les problèmes de performance lors du traitement de jeux de données volumineux"
                - "Optimiser les requêtes SQL afin de réduire significativement le temps d’exécution global du processus d’ingestion"

        -   title: "Technologies utilisées"
            groups:
                -   title: "Langages"
                    items:
                        - "Perl"
                        - "SQL"
                        - "Bash"
                -   title: "Base de données"
                    items:
                        - "MySQL"
                -   title: "Sources de données"
                    items:
                        - "Bases de données biologiques publiques"
                -   title: "Environnement"
                    items:
                        - "Linux"
                -   title: "Outils"
                    items:
                        - "NetBeans"
                        - "PhpMyAdmin"

        -   title: "Implémentation technique"
            paragraphs:
                - "Le système implémentait un pipeline d’ingestion de données récupérant des jeux de données biologiques depuis des bases de données publiques."
                - "Les scripts Perl étaient responsables de la récupération des jeux de données, de la transformation des données et de la génération de fichiers SQL contenant les requêtes d’insertion."
                - "Un script Bash orchestrant l’ensemble du workflow prenait en charge la création du schéma de base de données, la création des tables, l’exécution des scripts SQL d’insertion et l’application des contraintes d’intégrité une fois les données insérées."
                - "Cela permettait de recréer la base de données depuis zéro et garantissait que l’ensemble du processus d’ingestion pouvait être exécuté automatiquement."

        -   title: "Optimisation des performances"
            paragraphs:
                - "Lors du traitement de jeux de données plus volumineux, le temps d’exécution est devenu un problème pendant le processus d’ingestion."
                - "Plusieurs améliorations ont été implémentées : réduction des requêtes SQL générées inutilement, utilisation de stratégies d’insertion par lots au lieu d’exécuter de nombreuses requêtes d’insertion individuelles, et report de la création des contraintes de clés étrangères après l’insertion massive des données."
                - "Ces optimisations ont réduit significativement le temps d’exécution du pipeline d’ingestion, le faisant passer de plusieurs heures à seulement quelques minutes."
                - "Ce fut l’une de mes premières expériences pratiques liées à la performance des bases de données et à l’optimisation de l’ingestion de données."

        -   title: "Résultats / impact"
            paragraphs:
                - "Le projet a abouti à un prototype fonctionnel capable d’importer des jeux de données expérimentaux dans une base de données structurée."
                - "Le système a automatisé une grande partie du processus d’ingestion de données et a fourni une base pour de futures analyses de données de recherche."

        -   title: "Apprentissages clés"
            highlight: true
            list:
                - "Première expérience de conception d’un schéma de base de données depuis zéro"
                - "Implémentation de scripts automatisés de traitement de données"
                - "Collaboration avec des chercheurs dans un environnement scientifique"
                - "Exposition à des concepts de data engineering avant d’entrer dans l’industrie du développement web"

    back: "← Retour aux projets"

sogesa:
    meta_title: "Sogesa ERP System | Benjamin Lemin"
    eyebrow: "Projet interne · ERP · Agriculture"
    title: "Sogesa ERP System"
    lead: "Conception et développement d’un ERP web interne destiné à soutenir les activités quotidiennes des agronomes et la gestion opérationnelle de l’entreprise."

    meta:
        -   label: "Période :"
            value: "novembre 2011 – décembre 2014"
        -   label: "Rôle :"
            value: "Développeur principal"
        -   label: "Organisation :"
            value: "Sogesa"
        -   label: "Stack principale :"
            value: "PHP 5.3, SQL, JavaScript, HTML, CSS, Symfony 2, jQuery, Bootstrap, MySQL"

    sections:
        -   title: "Contexte"
            paragraphs:
                - "Sogesa est une société de conseil spécialisée dans la gestion et l’exploitation de terres agricoles pour le compte de propriétaires terriens."
                - "De nombreux propriétaires ne disposent pas de l’expertise ou des ressources nécessaires pour gérer eux-mêmes des terres agricoles."
                - "Sogesa agit comme intermédiaire entre les propriétaires et les différents acteurs impliqués dans la production agricole."
                - "Les agronomes employés par Sogesa sont responsables de l’analyse des sols, du choix des cultures à planter, de la coordination de la préparation des champs, du choix des traitements phytosanitaires, de l’organisation des récoltes et de la gestion de la vente des produits agricoles."
                - "Au moment où j’ai rejoint l’entreprise, très peu d’outils numériques existaient pour soutenir ces activités."
                - "L’objectif du projet était de construire progressivement un système logiciel interne permettant aux agronomes de gérer leur travail, puis d’étendre la plateforme pour soutenir la gestion opérationnelle de l’entreprise."

        -   title: "Utilisateurs"
            paragraphs:
                - "Le système était utilisé en interne par les membres de l’entreprise."
                - "Au total, la plateforme soutenait environ sept utilisateurs internes impliqués dans les opérations agricoles et l’administration de l’entreprise."
            list:
                - "4 agronomes"
                - "1 secrétaire"
                - "Le directeur de l’entreprise"
                - "L’assistante du directeur"

        -   title: "Objectif"
            paragraphs:
                - "Concevoir et développer un ERP web interne soutenant les activités quotidiennes des agronomes et la gestion opérationnelle de l’entreprise."
                - "Le système s’est d’abord concentré sur la numérisation du workflow utilisé par les agronomes sur le terrain, notamment la gestion des parcelles, des opérations agricoles et de la coordination avec les acteurs externes."
                - "Avec le temps, la plateforme s’est étendue pour inclure d’autres fonctions métier telles que la facturation, les commandes de produits et la gestion des stocks."

        -   title: "Concepts métier clés"
            paragraphs:
                - "Plusieurs concepts importants du domaine devaient être modélisés dans le système."
                - "Le système supportait la gestion de plusieurs années culturales simultanément et permettait aux agronomes d’adapter les structures de parcelles d’une saison à l’autre."
            list:
                - "Les parcelles agricoles, qui pouvaient évoluer au fil du temps"
                - "Les années culturales, qui suivent des cycles agricoles saisonniers plutôt que des années calendaires"
                - "Les opérations agricoles réalisées sur des parcelles spécifiques"
                - "Les ordres de travaux envoyés aux entrepreneurs agricoles"

        -   title: "Mon rôle"
            paragraphs:
                - "J’étais le développeur principal responsable de la construction de la première version du système."
                - "Pendant la première année du projet, j’étais le seul développeur travaillant sur l’application."
                - "Par la suite, un second développeur junior a rejoint le projet et nous avons continué à développer le système ensemble pendant plusieurs années."
                - "Mon travail impliquait de comprendre les workflows des agronomes, de concevoir la structure de la base de données et d’implémenter progressivement les fonctionnalités nécessaires pour soutenir leurs activités quotidiennes."
                - "Un audit technique externe du code a été réalisé pendant le projet afin d’évaluer la qualité de l’implémentation et de fournir des recommandations concernant l’architecture et les pratiques de développement."

        -   title: "Responsabilités"
            list:
                - "Compréhension et documentation des workflows des agronomes"
                - "Traduction des processus métier en fonctionnalités logicielles"
                - "Conception du schéma de base de données"
                - "Développement de l’application web depuis zéro"
                - "Implémentation de modules de gestion des parcelles agricoles, des opérations et des entités liées"
                - "Implémentation de fonctionnalités de gestion d’entreprise telles que la facturation et la gestion des stocks"
                - "Déploiement et maintenance de l’infrastructure applicative avec un hébergeur externe"
                - "Collaboration avec les agronomes et les autres parties prenantes pour affiner le système"

        -   title: "Fonctionnalités clés"
            list:
                - "Gestion des parcelles agricoles"
                - "Support de plusieurs années culturales"
                - "Création d’ordres de travaux agricoles"
                - "Export des ordres de travaux vers Excel pour une utilisation sur le terrain"
                - "Gestion de la facturation"
                - "Commandes de produits et gestion des stocks"
                - "Accès basé sur les rôles pour les agronomes et le personnel administratif"

        -   title: "Défis techniques"
            list:
                - "Apprendre PHP et l’architecture d’applications web tout en construisant le système"
                - "Concevoir et implémenter une application web complète depuis zéro"
                - "Comprendre un domaine métier complexe lié à la gestion de terres agricoles"
                - "Traduire des processus réels en modèles logiciels"
                - "Gérer l’infrastructure technique et le déploiement de l’application"
                - "Participer à de longues réunions avec des experts métier pour comprendre pleinement leurs workflows"
                - "Apprendre à estimer des tâches de développement et à planifier le travail d’implémentation"
                - "Adopter des pratiques plus modernes après les retours d’un audit externe du code"

        -   title: "Technologies utilisées"
            groups:
                -   title: "Langages"
                    items:
                        - "PHP 5.3"
                        - "SQL"
                        - "JavaScript"
                        - "HTML"
                        - "CSS"
                -   title: "Frameworks / librairies"
                    items:
                        - "Symfony 2, introduit plus tard pour la partie administrative de l’application"
                        - "jQuery"
                        - "Bootstrap"
                -   title: "Base de données"
                    items:
                        - "MySQL"
                -   title: "Outils"
                    items:
                        - "Doctrine ORM"
                        - "Bundle d’administration Symfony pour l’interface de gestion"
                        - "SVN puis Git"
                        - "XAMPP"
                        - "NetBeans IDE"
                -   title: "Infrastructure"
                    items:
                        - "Hébergeur externe"

        -   title: "Déploiement"
            paragraphs:
                - "Le processus de déploiement a évolué au cours du projet."
            list:
                - "Au départ, les déploiements étaient réalisés manuellement via FTP"
                - "Le versioning a ensuite été introduit avec SVN"
                - "Le projet a finalement migré vers Git"
                - "Les déploiements ont ensuite été effectués manuellement via un accès SSH au serveur d’hébergement"

        -   title: "Résultats / impact"
            paragraphs:
                - "Le projet a abouti à un ERP sur mesure utilisé en interne par Sogesa pour soutenir à la fois les opérations de terrain des agronomes et la gestion administrative de l’entreprise."
                - "La plateforme a progressivement remplacé des processus manuels et amélioré la coordination entre les agronomes et les autres acteurs impliqués dans la production agricole."
                - "Le système a continué à être utilisé et développé après mon départ."
                - "Bien qu’il ait été initialement développé par des développeurs juniors sans encadrement technique senior, le système s’est révélé suffisamment robuste pour rester en production active de nombreuses années après son développement initial."

        -   title: "Apprentissages clés"
            highlight: true
            list:
                - "Première expérience professionnelle de construction d’une application web complète"
                - "Apprentissage de PHP et du développement backend web dans un environnement de production"
                - "Compréhension de la manière de traduire des processus métier réels en systèmes logiciels"
                - "Expérience de collaboration directe avec des experts métier"
                - "Première exposition aux considérations d’architecture logicielle et de qualité du code"

    back: "← Retour aux projets"

publifund:
    meta_title: "Publifund Platform | Benjamin Lemin"
    eyebrow: "Projet client · Finance · Génération documentaire"
    title: "Publifund Platform"
    lead: "Maintenance et évolution d’une plateforme interne d’agrégation de données financières, de génération de documents réglementaires KIID et de distribution d’informations vers des médias financiers."

    meta:
        -   label: "Période :"
            value: "janvier 2015 – septembre 2015"
        -   label: "Rôle :"
            value: "Backend Developer"
        -   label: "Organisation :"
            value: "Financial Communication Consult"
        -   label: "Stack principale :"
            value: "PHP, SQL, MySQL, MongoDB, PDFLib, HTML, CSS, JavaScript, Linux"

    sections:
        -   title: "Contexte du projet"
            paragraphs:
                - "Publifund était une plateforme interne développée par Financial Communication Consult, une entreprise spécialisée dans la distribution d’informations financières pour des fonds d’investissement."
                - "La plateforme agrégeait des données liées aux fonds d’investissement depuis plusieurs sources externes et générait des documents réglementaires standardisés appelés KIID, pour Key Investor Information Documents."
                - "Ces documents sont requis par la réglementation financière européenne et doivent suivre des règles strictes de format et de contenu."
                - "Les informations et documents générés étaient distribués à des fournisseurs d’informations financières et à des plateformes médias telles que Bloomberg et d’autres distributeurs de données financières."
                - "Le système servait donc de plateforme d’agrégation de données, de génération documentaire et de distribution pour l’industrie des fonds d’investissement."

        -   title: "Objectifs du projet"
            list:
                - "Collecter des données liées aux fonds d’investissement depuis des sources externes"
                - "Traiter et normaliser les données collectées"
                - "Générer des documents réglementaires KIID au format PDF"
                - "Archiver les documents générés"
                - "Fournir des données structurées et des documents à des médias financiers externes"
                - "Offrir des outils internes de recherche et de gestion des données de fonds d’investissement"

        -   title: "Vue d’ensemble du système"
            paragraphs:
                - "La plateforme fonctionnait globalement comme un pipeline de traitement de données."
            flow:
                - "Sources de données externes"
                - "Collecte de données par scraping ou APIs"
                - "Parsing et normalisation"
                - "Stockage en base de données relationnelle"
                - "Génération des documents KIID"
                - "Archivage en base documentaire"
                - "Distribution vers des médias financiers externes"

        -   title: "Mon rôle"
            paragraphs:
                - "J’intervenais comme développeur backend au sein d’une petite équipe de développement."
            list:
                - "Développement et maintenance de générateurs de documents KIID"
                - "Implémentation et mise à jour de la logique de génération PDF"
                - "Maintenance de pages de listing complexes affichant des données financières"
                - "Participation à la logique de parsing pour les données collectées par des bots automatisés"
                - "Maintenance et évolution d’outils internes, incluant un système de ticketing personnalisé"
                - "Travail au sein d’une base de code PHP monolithique existante"

        -   title: "Structure d’équipe"
            paragraphs:
                - "L’équipe technique interne était composée d’environ sept personnes."
                - "J’ai rejoint l’équipe comme l’un des développeurs juniors."
                - "Les priorités de développement et la planification étaient principalement coordonnées par le lead developer avec la direction de l’entreprise."
            list:
                - "Lead developer"
                - "Senior developer"
                - "Backend developer"
                - "Full-stack developer"
                - "Deux développeurs frontend"
                - "Administrateur système"

        -   title: "Technologies utilisées"
            groups:
                -   title: "Langages principaux"
                    items:
                        - "PHP"
                        - "SQL"
                -   title: "Stockage de données"
                    items:
                        - "MySQL pour le stockage des données financières"
                        - "MongoDB pour l’archivage des documents générés"
                -   title: "Génération documentaire"
                    items:
                        - "PDFLib pour la génération des documents KIID au format PDF"
                -   title: "Frontend"
                    items:
                        - "HTML"
                        - "CSS"
                        - "JavaScript"
                -   title: "Infrastructure"
                    items:
                        - "Serveurs Linux"
                        - "Cron jobs pour les processus automatisés"

        -   title: "Traitement des données"
            paragraphs:
                - "Le système reposait sur des bots automatisés responsables de collecter des informations sur les fonds d’investissement depuis des sources externes."
                - "Ces bots exécutaient périodiquement des tâches correspondant à un workflow de collecte, parsing, normalisation et stockage en MySQL."
                - "Les documents KIID générés étaient ensuite créés à partir de ces données structurées."

        -   title: "Système de génération documentaire"
            paragraphs:
                - "Les documents KIID suivaient des structures réglementaires strictes définies par les autorités financières."
                - "Le système implémentait une approche de génération flexible, avec un générateur KIID par défaut pour la plupart des fonds et des générateurs personnalisés pour certains fonds spécifiques."
                - "La logique de génération était implémentée en PHP avec PDFLib."
                - "Une fois générés, les documents étaient archivés dans MongoDB afin de conserver les versions historiques, permettre une récupération rapide et servir les documents aux clients externes et aux utilisateurs internes."

        -   title: "Volume de données"
            paragraphs:
                - "L’archive documentaire stockée dans MongoDB atteignait plusieurs centaines de gigaoctets de données, reflétant le grand nombre de documents générés et de versions historiques maintenues par le système."

        -   title: "Défis techniques"
            subsections:
                -   title: "Travailler avec une large base de code existante"
                    paragraphs:
                        - "La plateforme avait été développée en interne pendant plusieurs années sans s’appuyer sur des frameworks mainstream."
                        - "Comprendre et naviguer dans cette architecture monolithique demandait un temps et un effort importants."
                -   title: "Contraintes de performance"
                    paragraphs:
                        - "Générer efficacement des documents réglementaires était un enjeu important en raison du nombre potentiellement élevé de documents demandés par les clients externes et les plateformes médias."
                        - "Certains choix d’implémentation privilégiaient la performance brute dans la génération documentaire."
                -   title: "Complexité du domaine financier"
                    paragraphs:
                        - "Le projet nécessitait de comprendre la structure des informations liées aux fonds d’investissement et la manière dont les documents réglementaires KIID devaient être générés."
                        - "Cela impliquait de travailler avec des données financières structurées, des formats documentaires stricts et des contraintes réglementaires sur le contenu."
                -   title: "Intégration avec des sources de données externes"
