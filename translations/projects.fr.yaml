    eyebrow: "Mission de consultance · Immobilier · Performance média"
    title: "Logic-Immo Image Delivery Platform"
    lead: "Conception et développement d’un service dédié au stockage et à la diffusion d’images immobilières afin d’améliorer les performances de chargement de la plateforme Logic-Immo."

    meta:
        -   label: "Période :"
