meta:
    title: "Backend skills, existing systems and technical support | Benjamin Lemin"
    description: "I take over, stabilize and evolve existing web applications. My strengths are backend work, reading complex systems and collaborating with teams."

hero:
    eyebrow: "Skills"
    title: "Understand what already exists, stabilize it and evolve it."
    intro: "I mostly work on **professional web applications** that are already in place: business platforms, CMSs, APIs, internal tools and complex systems. My role is to **reduce uncertainty**, secure what already works and move the product forward without distorting it."
    facts:
        label: "Profile highlights"
        experience:
            value: "15+ years"
            label: "on production web applications"
        backend:
            value: "Backend"
            label: "PHP, Symfony, APIs and business logic"
        transmission:
            value: "Knowledge sharing"
            label: "coaching, explanations and code reviews"

sections:
    contribution:
        eyebrow: "What I bring"
        title: "What I bring in priority"
        intro: "I step in where a team needs to **clarify**, **secure** or **evolve** an existing codebase without wasting time on unnecessary rewrites."

    technical:
        eyebrow: "Stack"
        title: "The technical building blocks I use"
        intro: "Technology is not the goal by itself: I choose it to **serve the need**, reduce risk and remain maintainable over time."

    practices:
        eyebrow: "How I work"
        title: "My development approach"
        intro: "I try to favor decisions that stay **understandable**, testable and easy for someone else to take over."

    soft_skills:
        eyebrow: "Working style"
        title: "The human skills that matter on a project"
        intro: "On a real project, value does not come only from code: it also comes from understanding the context, communicating well and helping the team move forward."

    domains:
        eyebrow: "Industries"
        title: "Varied contexts, one constant: understanding the business"
        intro: "The sectors below are not a single specialization; they mainly show my ability to **enter a context quickly** and respect its business rules."

    summary:
        eyebrow: "Wrap-up"
        title: "A useful profile when the work is about making progress on what already exists"
        paragraph_1: "I am particularly comfortable when I need to **take over an existing application**, stabilize it, prioritize the right work and help the product move forward without unnecessary rewrites."
        paragraph_2: "My profile is focused on **backend development**, **continuous maintenance**, system integration, code quality and technical support."
