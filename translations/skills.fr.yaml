meta:
    title: "Compétences backend, reprise d'existant et accompagnement | Benjamin Lemin"
    description: "Je reprends, stabilise et fais évoluer des applications web existantes. Mon point fort: le backend, la lecture des systèmes complexes et la collaboration avec les équipes."

hero:
    eyebrow: "Compétences"
    title: "Comprendre l'existant, le stabiliser et le faire évoluer."
    intro: "Je travaille surtout sur des **applications web professionnelles** déjà en place: plateformes métier, CMS, APIs, outils internes et systèmes complexes. Mon rôle est de **réduire l'incertitude**, sécuriser ce qui existe et faire avancer le produit sans le dénaturer."
    facts:
        label: "Points clés du profil"
        experience:
            value: "15+ ans"
            label: "sur des applications web en production"
        backend:
            value: "Backend"
            label: "PHP, Symfony, APIs et logique métier"
        transmission:
            value: "Transmission"
            label: "coaching, explications et code review"

sections:
    contribution:
        eyebrow: "Mon apport"
        title: "Ce que j'apporte en priorité"
        intro: "J'interviens là où une équipe a besoin de **clarifier**, **sécuriser** ou **faire évoluer** une base existante sans perdre de temps en réécriture inutile."

    technical:
        eyebrow: "Stack"
        title: "Les briques techniques que j'utilise"
        intro: "La technologie n'est pas une fin en soi: je la choisis pour **servir le besoin**, réduire le risque et rester exploitable dans la durée."

    practices:
        eyebrow: "Méthode"
        title: "Ma façon de travailler"
        intro: "J'essaie de privilégier des choix qui restent **compréhensibles**, testables et faciles à reprendre par une autre personne."

    soft_skills:
        eyebrow: "Relation"
        title: "Les compétences humaines qui comptent dans un projet"
        intro: "Sur un projet réel, la valeur ne vient pas seulement du code: elle vient aussi de la manière de comprendre le contexte, d'échanger et de faire avancer l'équipe."

    domains:
        eyebrow: "Secteurs"
        title: "Des contextes variés, un même réflexe: comprendre le métier"
        intro: "Les secteurs ci-dessous ne sont pas une spécialité unique; ils montrent surtout ma capacité à **entrer vite dans un contexte** et à respecter ses règles métier."

    summary:
        eyebrow: "Conclusion"
        title: "Un profil utile quand il faut avancer sur l'existant"
        paragraph_1: "Je suis particulièrement à l'aise quand il faut **prendre en charge une application existante**, la stabiliser, prioriser les bons chantiers et faire avancer le produit sans réécriture inutile."
        paragraph_2: "Mon profil est orienté **backend**, **maintenance évolutive**, intégration de systèmes, qualité du code et accompagnement technique."
        actions:
            contact: "Me contacter"
            projects: "Voir les projets"

